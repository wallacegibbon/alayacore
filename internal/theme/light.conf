# Accent color — selected items, focused borders, highlights
primary: #1e66f5

# Dimmed color — unfocused borders, muted text
dim: #d0d0d8

# Muted color — placeholders, secondary labels
muted: #6c6f85

# Primary text color — body content
text: #4c4f69

# Warning color — alerts, caution, confirmations
warning: #df8e1d

# Error color — errors, failures
error: #d20f39

# Success color — success messages, completion status
success: #40a02b

# Selection highlight — selected list item, search match
selection: #881337

# Cursor color — text input cursor
cursor: #1e1e2e

# Added lines in diff
added: #40a02b

# Removed lines in diff
removed: #d20f39

# Tool name — tool call labels in conversation
tool: #df8e1d

# Fold indicator — repeated to fill the fold splitter row
fold_indicator: "⁝"
