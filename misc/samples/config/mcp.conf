---
# GitHub Copilot MCP — uses built-in OAuth client
# alayacore ships with a pre-registered OAuth App for github.com.
# The browser opens for authorization on first use; token is
# persisted to ~/.alayacore/mcp-tokens/ for subsequent runs.
server: github
url: "https://api.githubcopilot.com/mcp"
auth-type: authorization_code
---
# MCP server with OAuth Client Credentials (client_secret)
server: example-api
url: "https://mcp.example.com"
auth-type: client_credentials
auth-token-endpoint: "https://auth.example.com/token"
auth-client-id: "my-service"
auth-client-secret: "s3cr3t"
auth-scopes: ["read", "write"]
---
# MCP server with OAuth Client Credentials (JWT assertion)
server: secure-api
url: "https://secure.corp.example.com/mcp"
auth-type: client_credentials
auth-token-endpoint: "https://auth.corp.example.com/token"
auth-client-id: "alayacore-prod"
auth-private-key: "@~/.ssh/mcp-jwt-key.pem"
auth-scopes: ["api:read", "api:write"]
---
# MCP server with static token (e.g. Exa API key)
server: exa-search
url: "https://mcp.exa.ai/mcp"
auth-type: static
auth-token: "your-exa-api-key"
---
# MCP server without authentication
server: public-api
url: "https://public.example.com/mcp"
---
# stdio MCP server (local subprocess)
server: file-system
command: "npx"
args: ["@anthropic/mcp-fs-server"]
env: {"TOKEN": "abc123"}
---
