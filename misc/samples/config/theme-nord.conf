# AlayaCore Theme Configuration - Nord
# An arctic, bluish color palette
#
# Usage:
#   alayacore --theme misc/samples/config/theme-nord.conf

# Background - polar night darkest
base: #2e3440

# Surface - polar night medium
surface1: #4c566a

# Accent - frost blue
accent: #88c0d0

# Dim - polar night light
dim: #434c5e

# Muted - snow storm light gray
muted: #d8dee9

# Primary text - snow storm white
text: #eceff4

# Warning - aurora yellow
warning: #ebcb8b

# Error - aurora red
error: #bf616a

# Success - aurora green
success: #a3be8c

# Peach - window cursor border highlight (when navigating windows)
peach: #d08770

# Cursor - text input cursor
cursor: #eceff4
