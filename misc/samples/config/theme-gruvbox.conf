# AlayaCore Theme Configuration - Gruvbox Dark
# A warm, retro theme inspired by Gruvbox color palette
# 
# Usage:
#   alayacore --theme misc/samples/config/theme-gruvbox.conf

# Background - dark gray
base: #282828

# Surface - medium gray
surface1: #504945

# Accent - bright blue
accent: #83a598

# Dim - faded gray
dim: #3c3836

# Muted - light gray
muted: #928374

# Primary text - cream
text: #ebdbb2

# Warning - bright yellow
warning: #fabd2f

# Error - bright red
error: #fb4934

# Success - bright green
success: #b8bb26

# Peach - window cursor border highlight (when navigating windows)
peach: #fe8019

# Cursor - text input cursor
cursor: #ebdbb2
